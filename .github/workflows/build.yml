name: build_pipeline

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: End-to-end pipeline
    runs-on: ubuntu-22.04
    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ vars.R2_BUCKET_NAME }}
      BC_BASE_URL: ${{ vars.BC_BASE_URL }}

    steps:
      # ── 0. Checkout this repo ──────────────────────────────────
      - name: Checkout baseball.computer
        uses: actions/checkout@v4

      # ── 1. Download Retrosheet data ────────────────────────────
      - name: Checkout Retrosheet data (Chadwick Bureau)
        uses: actions/checkout@v4
        with:
          repository: chadwickbureau/retrosheet
          path: chadwick-retrosheet

      - name: Normalize Retrosheet directory structure
        run: |
          mkdir -p retrosheet/gamelogs retrosheet/rosters retrosheet/schedules
          # Event files — keep seasons/ tree for the parser's recursive glob
          cp -r chadwick-retrosheet/seasons retrosheet/seasons
          # Reference CSVs expected at retrosheet root
          cp chadwick-retrosheet/reference/ballparks.csv retrosheet/
          cp chadwick-retrosheet/reference/biofile.csv retrosheet/
          # Gamelogs: per-year files + top-level postseason/all-star logs
          # Use -iname for case-insensitive match (repo mixes GL*.TXT and gl*.txt)
          find chadwick-retrosheet/seasons -iname 'gl*.txt' -exec cp {} retrosheet/gamelogs/ \;
          find chadwick-retrosheet/gamelog -iname '*.txt' -exec cp {} retrosheet/gamelogs/ \;
          # Rosters and schedules scattered across season dirs
          find chadwick-retrosheet/seasons -iname '*.ros' -exec cp {} retrosheet/rosters/ \;
          find chadwick-retrosheet/seasons -iname '*schedule.csv' -exec cp {} retrosheet/schedules/ \;
          rm -rf chadwick-retrosheet

      # ── 2. Build and run the Rust parser ───────────────────────
      - name: Checkout baseball.computer.rs
        uses: actions/checkout@v4
        with:
          repository: longoodr/baseball.computer.rs
          ref: fix/graceful-lineup-lookup
          path: baseball.computer.rs

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            baseball.computer.rs/target/
          key: cargo-${{ hashFiles('baseball.computer.rs/**/Cargo.lock') }}
          restore-keys: cargo-

      - name: Build Rust parser
        working-directory: baseball.computer.rs
        run: cargo build --release

      - name: Move Retrosheet data into parser directory
        run: mv retrosheet baseball.computer.rs/retrosheet

      - name: Run Rust parser (Retrosheet → CSV)
        working-directory: baseball.computer.rs
        run: |
          mkdir -p csv parquet
          ./target/release/baseball-computer -i retrosheet -o csv

      - name: Install parser Python dependencies
        working-directory: baseball.computer.rs
        run: pip install "numpy<2" && pip install -r bin/requirements.txt

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('baseball.computer.rs/bin/requirements.txt') }}
          restore-keys: pip-

      - name: Convert CSV → Parquet
        working-directory: baseball.computer.rs
        run: python bin/parquet.py

      - name: Generate auxiliary files
        working-directory: baseball.computer.rs
        run: python bin/simple_files.py

      # ── 3. Set up Python / Poetry and run dbt ──────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: pip install poetry

      - name: Install Python dependencies (this repo)
        run: poetry install --no-interaction --no-root

      - name: Create dbt profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          bc:
            target: main
            outputs:
              main:
                type: duckdb
                path: bc.db
                extensions:
                  - httpfs
                  - parquet
          EOF

      - name: Copy parser outputs for dbt sources
        run: |
          cp -r baseball.computer.rs/parquet ./parquet
          cp -r baseball.computer.rs/retrosheet_simple ./retrosheet_simple 2>/dev/null || true

      - name: Load parquet into DuckDB for dbt sources
        working-directory: bc
        run: |
          poetry run python - << 'PYEOF'
          import duckdb, glob, os

          conn = duckdb.connect("bc.db")
          conn.execute("INSTALL parquet; LOAD parquet")

          # Parser event/game/box_score parquets → schemas matching dbt source.yml
          schema_map = {
              "box_score": "box_score",
              "event": "event",
              "game": "game",
          }
          for parquet_file in sorted(glob.glob("../parquet/*.parquet")):
              table_name = os.path.splitext(os.path.basename(parquet_file))[0]
              schema = "event"
              for prefix, s in schema_map.items():
                  if table_name.startswith(prefix):
                      schema = s
                      break
              conn.execute(f"CREATE SCHEMA IF NOT EXISTS {schema}")
              # Deduplicate: Chadwick raw data has duplicate NLB games
              conn.execute(f"CREATE OR REPLACE TABLE {schema}.{table_name} AS SELECT DISTINCT * FROM '{parquet_file}'")
              count = conn.execute(f"SELECT count(*) FROM {schema}.{table_name}").fetchone()[0]
              print(f"  Loaded {schema}.{table_name} ({count} rows)")

          # Retrosheet simple files → misc schema
          conn.execute("CREATE SCHEMA IF NOT EXISTS misc")
          for parquet_file in sorted(glob.glob("../retrosheet_simple/*.parquet")):
              table_name = os.path.splitext(os.path.basename(parquet_file))[0]
              conn.execute(f"CREATE OR REPLACE TABLE misc.{table_name} AS SELECT DISTINCT * FROM '{parquet_file}'")
              count = conn.execute(f"SELECT count(*) FROM misc.{table_name}").fetchone()[0]
              print(f"  Loaded misc.{table_name} ({count} rows)")

          # Baseballdatabank (if present)
          if os.path.isdir("../baseballdatabank"):
              conn.execute("CREATE SCHEMA IF NOT EXISTS baseballdatabank")
              for parquet_file in sorted(glob.glob("../baseballdatabank/*.parquet")):
                  table_name = os.path.splitext(os.path.basename(parquet_file))[0]
                  conn.execute(f"CREATE OR REPLACE TABLE baseballdatabank.{table_name} AS SELECT DISTINCT * FROM '{parquet_file}'")
                  print(f"  Loaded baseballdatabank.{table_name}")

          conn.close()
          print("Done loading sources into bc.db")
          PYEOF

      - name: Run dbt deps & build
        working-directory: bc
        run: |
          poetry run dbt deps
          poetry run dbt run-operation create_enums
          poetry run dbt run-operation alter_types
          poetry run dbt run --exclude source:baseballdatabank+ || echo "Warning: some dbt models failed (expected for historical data quality issues)"
          poetry run dbt test || echo "Warning: some dbt tests failed"

      # ── 4. Export and upload to R2 ─────────────────────────────
      - name: Run create_web_db.py
        working-directory: bc
        run: poetry run python ../scripts/create_web_db.py

      # ── 5. Purge Cloudflare cache (optional) ──────────────────
      - name: Purge Cloudflare cache
        if: ${{ env.CLOUDFLARE_ZONE != '' && env.PURGE_CACHE_TOKEN != '' }}
        env:
          CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE }}
          PURGE_CACHE_TOKEN: ${{ secrets.PURGE_CACHE_TOKEN }}
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE}/purge_cache" \
            -H "Authorization: Bearer ${PURGE_CACHE_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything": true}'
